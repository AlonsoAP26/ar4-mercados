<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex">
<title>Vista previa: 20 avatares AR4</title>
<style>
body{background:#0a0f1c;color:#e8edf5;margin:0;padding:28px 16px;font-family:'Segoe UI',system-ui,sans-serif;}
h1{text-align:center;font-size:1.4rem;margin:0 0 6px;}
p.sub{text-align:center;color:#8b93a7;font-size:.9rem;margin:0 0 26px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px;max-width:900px;margin:0 auto;}
.cell{background:#101728;border:1px solid #202a3d;border-radius:14px;padding:16px 12px;text-align:center;}
.cell svg{width:118px;height:118px;}
.cell .n{font-size:.82rem;font-weight:600;margin-top:8px;}
.cell .r{font-size:.64rem;text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.comun{color:#c7cede;}.raro{color:#8ee7d6;}.legendario{color:#f0c75e;}
</style><meta property="og:type" content="website">

<h1>Colección AR4 · 20 emblemas</h1>
<p class="sub">Vista previa. Aún no están activos en la tienda hasta que ejecutes el reseed.</p>
<div class="grid" id="g"></div>
<script>var module={exports:{}};
// Generador determinístico de la Colección de Avatares AR4.
// Rediseño: 20 EMBLEMAS con simbología de trading (toro, oso, vela, diamante,
// corona, cohete, rayo, diana, etc.), no personajes mascota. Cada emblema es un
// glifo audaz sobre un fondo con degradado tipo joya y un anillo. Coleccionables
// cosméticos guardados en la base de datos; cada índice (1-20) produce siempre
// el mismo avatar. No son NFTs ni usan blockchain, y no representan personas.
//
// Rareza y compra (respeta los endpoints existentes):
//   - comun: se compra con PUNTOS de comunidad
//   - raro / legendario: se compran con soles
// Los 20 son visualmente premium; la rareza marca el aro y el precio, no si
// "se ven bien".

const TOTAL = 20;

const GOLD_LIGHT = '#fbe9b0';
const GOLD_ACCENT = '#f0c75e';
const GOLD_DEEP = '#b8860b';

// Paletas de fondo tipo joya (una por emblema, en orden).
const BG = [
  ['#3a2a1a', '#140d06'], // toro — ámbar
  ['#2a1a2a', '#120612'], // oso — vino
  ['#123a2e', '#05140f'], // vela — esmeralda
  ['#1a2a3a', '#060d14'], // tendencia — acero
  ['#1e2f4a', '#0a1120'], // diamante — zafiro
  ['#3a2e12', '#140f05'], // corona — oro
  ['#3a1a1a', '#140606'], // cohete — carmín
  ['#2e2a12', '#120f05'], // rayo — cetrino
  ['#1a3a3a', '#061414'], // diana — cian profundo
  ['#2a3312', '#0f1405'], // moneda — oliva
  ['#12233a', '#060d14'], // barras — azul noche
  ['#2a1a33', '#0f0614'], // balanza — amatista
  ['#123a2a', '#05140d'], // escudo — jade
  ['#3a2412', '#140c05'], // llama — cobre
  ['#2a2440', '#0d0a18'], // estrella — índigo
  ['#123340', '#051318'], // circuito IA — teal
  ['#2a2a2e', '#0c0c0e'], // calavera — grafito
  ['#33122a', '#140510'], // ojo — magenta oscuro
  ['#1a3340', '#061218'], // infinito — petróleo
  ['#241a3a', '#0c0714'], // brújula — noche violeta
];

// Nombres (orden = índice).
const NAMES = [
  'Toro de AR4', 'Oso de AR4', 'Vela Alcista', 'Impulso', 'Diamante',
  'Corona del Mercado', 'Cohete', 'Rayo', 'Diana', 'Moneda de Oro',
  'Torre de Datos', 'Equilibrio', 'Escudo del Capital', 'Llama', 'Estrella del Trader',
  'Núcleo IA', 'Calavera del Riesgo', 'Ojo del Mercado', 'Infinito', 'Brújula',
];

// Reparto de rareza: 8 comun (puntos), 8 raro (soles), 4 legendario (soles/oro).
function tierForSeq(seq) {
  if (seq <= 8) return 'comun';
  if (seq <= 16) return 'raro';
  return 'legendario';
}

// ── Glifos (uno por índice) ─────────────────────────────────────────────────
// Cada función dibuja centrada alrededor de (100,100). `c` = color principal.
function gStroke(d, c, w) { return `<path d="${d}" fill="none" stroke="${c}" stroke-width="${w || 8}" stroke-linecap="round" stroke-linejoin="round"/>`; }
function gFill(d, c) { return `<path d="${d}" fill="${c}"/>`; }

const GLYPHS = [
  // 1 Toro (cabeza + cuernos)
  (c) => gStroke('M62 78 Q54 60 66 58 Q76 62 78 76', c, 8) + gStroke('M138 78 Q146 60 134 58 Q124 62 122 76', c, 8) +
    gStroke('M74 84 Q100 66 126 84 Q138 100 126 122 Q100 142 74 122 Q62 100 74 84 Z', c, 8) +
    `<circle cx="86" cy="100" r="5" fill="${c}"/><circle cx="114" cy="100" r="5" fill="${c}"/>` + gStroke('M90 120 Q100 126 110 120', c, 7),
  // 2 Oso (cabeza + orejas)
  (c) => `<circle cx="70" cy="70" r="13" fill="none" stroke="${c}" stroke-width="8"/><circle cx="130" cy="70" r="13" fill="none" stroke="${c}" stroke-width="8"/>` +
    gStroke('M70 96 Q100 74 130 96 Q142 116 128 134 Q100 152 72 134 Q58 116 70 96 Z', c, 8) +
    `<circle cx="88" cy="108" r="4.5" fill="${c}"/><circle cx="112" cy="108" r="4.5" fill="${c}"/>` + `<circle cx="100" cy="122" r="5" fill="${c}"/>`,
  // 3 Vela alcista (candlestick)
  (c) => gStroke('M100 48 V70', c, 7) + gStroke('M100 130 V152', c, 7) + `<rect x="86" y="70" width="28" height="60" rx="5" fill="${c}"/>`,
  // 4 Impulso (flecha tendencia)
  (c) => gStroke('M56 130 L88 96 L108 116 L146 72', c, 9) + gStroke('M124 70 H148 V94', c, 9),
  // 5 Diamante
  (c) => gStroke('M66 84 H134 L100 146 Z', c, 8) + gStroke('M66 84 L82 62 H118 L134 84', c, 8) + gStroke('M82 62 L100 146 L118 62 M66 84 H134', c, 6),
  // 6 Corona
  (c) => gStroke('M60 126 H140 M60 126 L54 76 L82 100 L100 66 L118 100 L146 76 L140 126', c, 8) +
    `<circle cx="54" cy="72" r="5" fill="${c}"/><circle cx="146" cy="72" r="5" fill="${c}"/><circle cx="100" cy="60" r="5" fill="${c}"/>`,
  // 7 Cohete
  (c) => gStroke('M100 50 Q120 74 118 108 L100 124 L82 108 Q80 74 100 50 Z', c, 8) +
    `<circle cx="100" cy="88" r="7" fill="${c}"/>` + gStroke('M82 106 L66 122 L84 118 M118 106 L134 122 L116 118', c, 7) + gStroke('M92 128 Q100 142 108 128', c, 7),
  // 8 Rayo
  (c) => gFill('M108 46 L74 106 H96 L92 154 L128 92 H104 Z', c),
  // 9 Diana
  (c) => `<circle cx="100" cy="100" r="46" fill="none" stroke="${c}" stroke-width="8"/><circle cx="100" cy="100" r="26" fill="none" stroke="${c}" stroke-width="8"/><circle cx="100" cy="100" r="7" fill="${c}"/>`,
  // 10 Moneda $
  (c) => `<circle cx="100" cy="100" r="46" fill="none" stroke="${c}" stroke-width="8"/>` + gStroke('M100 70 V130 M114 82 Q100 74 90 84 Q84 94 100 100 Q116 106 110 118 Q100 128 86 120', c, 7),
  // 11 Torre de datos (barras)
  (c) => `<rect x="60" y="112" width="18" height="36" rx="3" fill="${c}"/><rect x="91" y="86" width="18" height="62" rx="3" fill="${c}"/><rect x="122" y="62" width="18" height="86" rx="3" fill="${c}"/>`,
  // 12 Equilibrio (balanza)
  (c) => gStroke('M100 56 V150 M64 150 H136', c, 8) + gStroke('M60 74 H140', c, 8) + `<circle cx="100" cy="62" r="6" fill="${c}"/>` +
    gStroke('M60 74 L48 104 H72 Z M140 74 L128 104 H152 Z', c, 7),
  // 13 Escudo
  (c) => gStroke('M100 50 L142 66 V102 Q142 134 100 152 Q58 134 58 102 V66 Z', c, 8) + gStroke('M84 100 L96 114 L120 84', c, 8),
  // 14 Llama
  (c) => gStroke('M100 48 Q128 78 122 112 Q118 142 100 150 Q82 142 78 112 Q74 90 92 74 Q96 92 108 92 Q116 78 100 48 Z', c, 8),
  // 15 Estrella
  (c) => gFill('M100 50 L112 84 L148 84 L119 106 L130 142 L100 120 L70 142 L81 106 L52 84 L88 84 Z', c),
  // 16 Núcleo IA (hexágono + circuito)
  (c) => gStroke('M100 52 L142 76 V124 L100 148 L58 124 V76 Z', c, 8) + `<circle cx="100" cy="100" r="12" fill="none" stroke="${c}" stroke-width="7"/>` +
    gStroke('M100 88 V64 M100 112 V136 M88 100 H62 M112 100 H138', c, 6) + `<circle cx="100" cy="64" r="4" fill="${c}"/><circle cx="100" cy="136" r="4" fill="${c}"/><circle cx="62" cy="100" r="4" fill="${c}"/><circle cx="138" cy="100" r="4" fill="${c}"/>`,
  // 17 Calavera del riesgo
  (c) => gStroke('M70 92 Q70 56 100 56 Q130 56 130 92 Q130 110 120 118 V132 H80 V118 Q70 110 70 92 Z', c, 8) +
    `<circle cx="86" cy="96" r="8" fill="${c}"/><circle cx="114" cy="96" r="8" fill="${c}"/>` + gStroke('M94 116 L100 108 L106 116 M88 132 V142 M100 132 V144 M112 132 V142', c, 6),
  // 18 Ojo del mercado
  (c) => gStroke('M52 100 Q100 62 148 100 Q100 138 52 100 Z', c, 8) + `<circle cx="100" cy="100" r="16" fill="none" stroke="${c}" stroke-width="7"/><circle cx="100" cy="100" r="5" fill="${c}"/>`,
  // 19 Infinito
  (c) => gStroke('M76 100 Q76 78 92 78 Q108 78 108 100 Q108 122 124 122 Q140 122 140 100 Q140 78 124 78 Q108 78 108 100 Q108 122 92 122 Q76 122 76 100 Z', c, 8),
  // 20 Brújula
  (c) => `<circle cx="100" cy="100" r="46" fill="none" stroke="${c}" stroke-width="8"/>` + gFill('M100 62 L112 100 L100 138 L88 100 Z', c) +
    `<circle cx="100" cy="100" r="6" fill="${BG[19][1]}" stroke="${c}" stroke-width="4"/>`,
];

function generateAvatar(seq) {
  if (seq < 1 || seq > TOTAL) throw new Error('seq fuera de rango (1-' + TOTAL + ')');
  const i = seq - 1;
  const rarity = tierForSeq(seq);
  const bg = BG[i];
  const name = NAMES[i];

  let ring, ringW, glyphColor, glow, pricePoints = null, priceSoles = null, sparkles = '';
  if (rarity === 'comun') {
    ring = '#c7cede'; ringW = 4; glyphColor = '#e8edf5'; glow = false;
    pricePoints = 350;
  } else if (rarity === 'raro') {
    ring = '#8ee7d6'; ringW = 5; glyphColor = '#bff3e8'; glow = true;
    priceSoles = 7;
  } else {
    ring = 'url(#goldRing)'; ringW = 6; glyphColor = GOLD_LIGHT; glow = true;
    priceSoles = 16;
    for (let k = 0; k < 10; k++) {
      const ang = (Math.PI * 2 * k) / 10 + (i * 0.21);
      const r = 90 + (k % 3);
      const x = 100 + r * Math.cos(ang), y = 100 + r * Math.sin(ang);
      sparkles += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${(1.1 + (k % 3) * 0.5).toFixed(1)}" fill="${GOLD_LIGHT}" opacity="0.75"/>`;
    }
  }

  const glyph = GLYPHS[i](glyphColor);

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<defs>
<radialGradient id="bg" cx="34%" cy="28%" r="90%"><stop offset="0%" stop-color="${bg[0]}"/><stop offset="100%" stop-color="${bg[1]}"/></radialGradient>
${rarity === 'legendario' ? `<linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${GOLD_LIGHT}"/><stop offset="45%" stop-color="${GOLD_ACCENT}"/><stop offset="100%" stop-color="${GOLD_DEEP}"/></linearGradient>` : ''}
${glow ? `<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>` : ''}
</defs>
<circle cx="100" cy="100" r="96" fill="url(#bg)"/>
<circle cx="100" cy="100" r="80" fill="none" stroke="${glyphColor}" stroke-width="1" opacity="0.14"/>
<g ${glow ? 'filter="url(#glow)"' : ''}>${glyph}</g>
${sparkles}
<circle cx="100" cy="100" r="96" fill="none" stroke="${ring}" stroke-width="${ringW}"/>
</svg>`;

  return { seq, rarity, name, svg, pricePoints, priceSoles };
}

function generateAll() {
  const out = [];
  for (let seq = 1; seq <= TOTAL; seq++) out.push(generateAvatar(seq));
  return out;
}

const AR4AvatarGen = { generateAvatar, generateAll, TOTAL, tierForSeq };
if (typeof module !== 'undefined' && module.exports) module.exports = AR4AvatarGen;

var all=AR4AvatarGen.generateAll();
document.getElementById('g').innerHTML=all.map(function(a){
  return '<div class="cell">'+a.svg+'<div class="n">'+a.name+'</div><div class="r '+a.rarity+'">'+a.rarity+'</div></div>';
}).join('');
</script></body></html>
