[build]
  functions = "netlify/functions"
  publish = "."
  # El flash del mercado se sirve en vivo desde netlify/functions/flash-live.js
  # (lee directo de GitHub), asi que un commit que SOLO toca data/flash.json
  # no necesita reconstruir el sitio entero. Esto permite que el bot publique
  # cada pocos minutos sin gastar minutos de build de Netlify.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!data/flash.json'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

# El service worker y el manifiesto nunca deben quedarse cacheados: si se
# guardan, el navegador seguiria usando una version vieja de la app instalada.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"
