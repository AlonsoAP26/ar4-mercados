name: Publicar noticia de mercado automáticamente

# El cron diario vive ahora en auto-publish-diario.yml (un solo deploy para los
# tres contenidos). Este workflow queda solo para ejecucion manual.
on:
  workflow_dispatch:

jobs:
  generate-noticia:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar noticia con IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-noticia.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "AR4 Mercados Bot"
          git config user.email "bot@ar4mercados.local"
          git add data/noticias.json
          git diff --staged --quiet || git commit -m "Nueva noticia de mercado generada automáticamente"
          git push
