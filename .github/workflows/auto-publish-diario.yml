name: Publicar contenido diario (noticia + idea + psicotrading)

# Un solo commit diario con los tres contenidos = un solo deploy en Netlify.
# Antes eran 3 workflows con 3 pushes = 3 deploys (~45 creditos/dia).
# Ahora: 1 push = 1 deploy (~15 creditos/dia).
# La hora es la de Noticias (21:30 UTC = 16:30 Lima), media hora despues
# del cierre de EE.UU., porque la noticia necesita los datos del cierre.
#
# La jornada de trading va del domingo por la tarde (apertura del Forex) al
# viernes por la noche (cierre de Wall Street). El sabado el mercado esta
# cerrado y no hay sesion nueva que resumir, por eso NO se publica ese dia.
# cron '30 21 * * 0-5' = domingo(0) a viernes(5), 21:30 UTC. Todo automatico,
# sin intervencion manual.

on:
  schedule:
    - cron: '30 21 * * 0-5'
  workflow_dispatch:

concurrency:
  group: publicar-contenido-diario
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      # Un relanzamiento ("Re-run") usa la foto del repo del run original, que
      # puede ser vieja: los generadores no verian lo ya publicado, duplicarian
      # contenido y el push moriria en conflicto (paso el 21/jul). Traer el
      # master mas reciente antes de generar elimina ese caso.
      - name: Actualizar al master mas reciente
        run: git pull --rebase origin master

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cada generador es independiente: continue-on-error evita que el fallo
      # de uno impida que los otros dos se publiquen.
      - name: Generar noticia de mercado
        id: noticia
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-noticia.js

      - name: Generar analisis de Ideas de Trading
        id: idea
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-idea.js

      - name: Generar articulo de Psicotrading
        id: articulo
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      # UN solo commit + UN solo push = UN solo deploy.
      - name: Commit y push unico
        id: publicar
        if: always()
        run: |
          git config user.name "AR4 Mercados Bot"
          git config user.email "bot@ar4mercados.local"
          git add data/noticias.json data/ideas.json data/articulos.json
          if git diff --staged --quiet; then
            echo "Sin cambios que publicar."
            echo "publicado=no" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Contenido diario: noticia de mercado, idea de trading y articulo de Psicotrading"
          for intento in 1 2 3; do
            if git pull --rebase --autostash origin master && git push; then
              echo "publicado=si" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Si el pull dejo un rebase a medias (conflicto), abortarlo:
            # sin esto los reintentos mueren con "unmerged files" sin pullear.
            git rebase --abort 2>/dev/null || true
            echo "Push fallido, reintento $intento..."
            sleep 5
          done
          echo "No se pudo publicar tras 3 intentos."
          exit 1

      - name: Resumen
        if: always()
        run: |
          echo "Noticia:      ${{ steps.noticia.outcome }}"
          echo "Idea:         ${{ steps.idea.outcome }}"
          echo "Psicotrading: ${{ steps.articulo.outcome }}"
          echo "Publicado:    ${{ steps.publicar.outputs.publicado }}"
          # Un fallo parcial debe verse en rojo: un check verde con la noticia
          # sin publicar es exactamente lo que oculto el fallo del 17-19/jul.
          # Lo ya generado se publica igual (el commit corre antes de este paso).
          fallo=0
          if [ "${{ steps.noticia.outcome }}" != "success" ]; then
            echo "::error::El generador de NOTICIAS falló (ver anotación del paso para el motivo)."
            fallo=1
          fi
          if [ "${{ steps.idea.outcome }}" != "success" ]; then
            echo "::error::El generador de IDEAS falló."
            fallo=1
          fi
          if [ "${{ steps.articulo.outcome }}" != "success" ]; then
            echo "::error::El generador de PSICOTRADING falló."
            fallo=1
          fi
          exit $fallo
