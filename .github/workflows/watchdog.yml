name: Vigia automatico (auto-repara y avisa solo si no pudo)

# Corre dos veces al dia: a las 22:45 UTC (75 min despues de la publicacion
# diaria de las 21:30, la ventana donde suele fallar un generador) y a las
# 11:00 UTC como red de seguridad de la mañana. Verifica que el contenido
# esperado exista y que el sitio responda; si un generador fallo, LO RELANZA
# SOLO y re-verifica. Solo envia email (fallo del job) si la auto-reparacion
# tampoco funciono — cero ruido, cero intervencion manual.
#
# La reparacion vespertina es la valiosa: repara EL MISMO DIA, asi la noticia
# sale con la fecha correcta y cubre el cierre de esa jornada. La matinal solo
# atrapa lo que la vespertina no pudo (con fecha del dia siguiente).

on:
  schedule:
    - cron: '45 22 * * 0-5'   # 22:45 UTC = 5:45 pm Lima, tras la publicacion (dom-vie)
    - cron: '0 11 * * *'      # 11:00 UTC = 6:00 am Lima, red de seguridad diaria
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # necesario para relanzar workflows caidos

jobs:
  vigia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Salud del sitio (paginas y funciones clave)
        run: |
          fallos=0
          for url in \
            "https://ar4mercados.com/" \
            "https://ar4mercados.com/educacion.html" \
            "https://ar4mercados.com/comunidad.html" \
            "https://ar4mercados.com/.netlify/functions/market-price?symbol=EURUSD%3DX" \
            "https://ar4mercados.com/.netlify/functions/symbol-search?q=sap"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url")
            echo "$code  $url"
            if [ "$code" != "200" ]; then fallos=$((fallos+1)); fi
          done
          if [ "$fallos" -gt 0 ]; then
            echo "::error::$fallos URL(s) clave no responden 200. Revisar Netlify."
            exit 1
          fi

      - name: Frescura del contenido diario (con auto-relanzamiento)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # El cron publica dom-vie a las 21:30 UTC. La corrida vespertina
          # (>= 22:00 UTC) exige contenido de HOY, porque la publicacion del
          # dia ya debio salir; la matinal exige contenido de AYER. En ambos
          # casos, si ese dia fue sabado no habia sesion y no se exige nada.
          hora=$(date -u +%H)
          if [ "$hora" -ge 22 ]; then
            objetivo=$(date -u +%Y-%m-%d)
            dia_objetivo=$(date -u +%u)   # 1=lunes ... 6=sabado 7=domingo
          else
            objetivo=$(date -u -d "yesterday" +%Y-%m-%d)
            dia_objetivo=$(date -u -d "yesterday" +%u)
          fi
          if [ "$dia_objetivo" = "6" ]; then
            echo "El dia exigido ($objetivo) fue sabado: no se esperaba publicacion. OK."
            exit 0
          fi
          frescura() {
            node -e "
              const d=require('./data/$1');
              const max=d.map(x=>x.date||'').sort().pop()||'';
              console.log(max);
            "
          }
          revisar() {
            ok=1
            for f in noticias.json ideas.json articulos.json; do
              ult=$(frescura "$f")
              echo "data/$f -> ultima fecha: $ult (se exige >= $objetivo)"
              if [ "$ult" \< "$objetivo" ]; then ok=0; fi
            done
            echo $ok
          }
          resultado=$(revisar | tail -1)
          if [ "$resultado" = "1" ]; then
            echo "Contenido al dia. OK."
            exit 0
          fi
          echo "Contenido atrasado: relanzando el generador diario..."
          gh workflow run auto-publish-diario.yml --ref master
          echo "Esperando 8 minutos a que genere y publique..."
          sleep 480
          git fetch origin master --quiet
          git checkout origin/master -- data/ 2>/dev/null || true
          resultado2=$(revisar | tail -1)
          if [ "$resultado2" = "1" ]; then
            echo "Auto-reparacion exitosa: el contenido ya esta al dia."
            exit 0
          fi
          echo "::error::El contenido sigue atrasado tras el relanzamiento automatico. Requiere revision (Actions -> Publicar contenido diario -> logs)."
          exit 1

      - name: Generadores secundarios caidos (relanzar si el ultimo run fallo)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for wf in auto-persona-chat.yml auto-publish-community.yml; do
            estado=$(gh run list --workflow "$wf" --limit 1 --json conclusion --jq '.[0].conclusion // "none"')
            echo "$wf -> ultimo run: $estado"
            if [ "$estado" = "failure" ]; then
              echo "Relanzando $wf..."
              gh workflow run "$wf" --ref master
            fi
          done
