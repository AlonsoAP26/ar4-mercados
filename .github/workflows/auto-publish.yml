name: Publicar artículo de Psicotrading automáticamente

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar artículo con IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit y push si hay cambios
        run: |
          git config user.name "AR4 Mercados Bot"
          git config user.email "bot@ar4mercados.local"
          git add data/articulos.json
          git diff --staged --quiet || git commit -m "Nuevo artículo de Psicotrading generado automáticamente"
          git push
